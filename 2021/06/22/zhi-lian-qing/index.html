<!DOCTYPE html> <html lang="zh-Hans"> <head> <meta charset="utf-8"> <meta http-equiv="X-UA-Compatible" content="IE=Edge"> <title> 致恋情 · monsoon </title> <meta name="viewport" content="width=device-width"> <meta name="description" content="Welcome to my blog"> <link rel="canonical" href="https://monsoon.cl/2021/06/22/zhi-lian-qing/"> <!-- prevent favicon.ico request --> <link rel="icon" href="data:,"> <link type="application/atom+xml" rel="alternate" href="https://monsoon.cl/feed.xml" title="monsoon" /> <link rel="stylesheet" href="/css/style.css"> </head> <body> <header class="site-header"> <a class="site-title" href="/">monsoon</a> <nav class="site-nav"> <div class="trigger"> <a class="page-link" href="/">Post</a> <a class="page-link" href="/nokosu/">のこす</a> <a class="page-link" href="/about_and_links/">About & Links</a> </div> </nav> </header> <main class="page-content"> <article class="post" itemscope itemtype="https://schema.org/BlogPosting"> <div class="post-header"> <h1 itemprop="name headline">致恋情</h1> <span class="meta"> <time datetime="2021-06-22T12:00:00+00:00" itemprop="datePublished"> Jun 22, 2021 </time> </span> </div> <div class="post-content" itemprop="articleBody"> <blockquote> <p>这篇文章也许是受小时候看过的一篇关于箭和友情的诗歌的影响而产生的。</p> </blockquote> <p>他在荒野上与她相遇，便迷恋于她的点点滴滴。他取下了挂在了身后的箭矢，在射向她的时候，他还能感受到箭镞上所传来的那份灼热的心情。</p> <p>那是一只不同寻常的箭，可以跨越时空、年少时的青涩，向未来传达着什么。</p> <p>多少年后的一天，他与她再次相遇。他发现他再也无法找到那只箭了。</p> <p>他不知道那只箭在射向未来的时候已和她擦身而过，还是其实已经在中途迷失了呢？</p> <p>只是他喜欢回忆中的过去的那个她？还是什么都已经物是人非了吗？</p> </div> <div class="post-comment" itemprop="comment"> <div id="disqus_thread"></div> <script> (function() { var d = document, s = d.createElement('script'); s.src = 'https://monsooncl.disqus.com/embed.js'; s.setAttribute('data-timestamp', +new Date()); (d.head || d.body).appendChild(s); })(); </script> <noscript>Please enable JavaScript to view the comments.</noscript> </div> </article> </main> </body> </html>
