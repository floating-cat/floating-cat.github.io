<!DOCTYPE html> <html lang="zh-Hans"> <head> <meta charset="utf-8"> <meta http-equiv="X-UA-Compatible" content="IE=Edge"> <title> 共鸣 · monsoon </title> <meta name="viewport" content="width=device-width"> <meta name="description" content="Welcome to my blog"> <link rel="canonical" href="https://monsoon.cl/2021/02/17/resonance/"> <!-- prevent favicon.ico request --> <link rel="icon" href="data:,"> <link type="application/atom+xml" rel="alternate" href="https://monsoon.cl/feed.xml" title="monsoon" /> <link rel="stylesheet" href="/css/style.css"> </head> <body> <header class="site-header"> <a class="site-title" href="/">monsoon</a> <nav class="site-nav"> <div class="trigger"> <a class="page-link" href="/">Post</a> <a class="page-link" href="/nokosu/">のこす</a> <a class="page-link" href="/about_and_links/">About & Links</a> </div> </nav> </header> <main class="page-content"> <article class="post" itemscope itemtype="https://schema.org/BlogPosting"> <div class="post-header"> <h1 itemprop="name headline">共鸣</h1> <span class="meta"> <time datetime="2021-02-17T12:00:00+00:00" itemprop="datePublished"> Feb 17, 2021 </time> </span> </div> <div class="post-content" itemprop="articleBody"> <div class="poem"> <div class="poem-text"> <p>最近在看三体， <br /> 并不觉得有趣，<br /> 然后在群里谈论起了科幻的话题。</p> <p>边听着音乐，<br /> 突然发现主流的科幻小说好像并不有趣的多，<br /> 想起了之前看过的一本科幻的轻小说。</p> <p>我从未如此近的感受到，<br /> 我与美少女，<br /> 与那样的让人喜欢的科幻设定，<br /> 如同在我耳朵边响起的音乐那般律动，<br /> 这样美好的心情了。</p> </div> </div> </div> <div class="post-comment" itemprop="comment"> <div id="disqus_thread"></div> <script> (function() { var d = document, s = d.createElement('script'); s.src = 'https://monsooncl.disqus.com/embed.js'; s.setAttribute('data-timestamp', +new Date()); (d.head || d.body).appendChild(s); })(); </script> <noscript>Please enable JavaScript to view the comments.</noscript> </div> </article> </main> </body> </html>
