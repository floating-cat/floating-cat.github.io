<!DOCTYPE html> <html lang="zh-Hans"> <head> <meta charset="utf-8"> <meta http-equiv="X-UA-Compatible" content="IE=Edge"> <title>骤停</title> <meta name="viewport" content="width=device-width"> <meta name="description" content="Welcome to my blog"> <link rel="canonical" href="https://monsoon.cl/2020/03/11/stop-but-start-again/"> <!-- prevent favicon.ico request --> <link rel="icon" href="data:,"> <link type="application/atom+xml" rel="alternate" href="https://monsoon.cl/feed.xml" title="monsoon" /> <link rel="stylesheet" href="/css/style.css"> </head> <body> <header class="site-header"> <a class="site-title" href="/">monsoon</a> <nav class="site-nav"> <div class="trigger"> <a class="page-link" href="/">Post</a> <a class="page-link" href="/category/nokosu/">のこす</a> <a class="page-link" href="/about_and_links/">About & Links</a> </div> </nav> </header> <main class="page-content"> <article class="post" itemscope itemtype="https://schema.org/BlogPosting"> <div class="post-header"> <h1 itemprop="name headline">骤停</h1> <span class="meta"> <time datetime="2020-03-11T14:00:00+00:00" itemprop="datePublished"> Mar 11, 2020 </time> </span> </div> <div class="post-content" itemprop="articleBody"> <p>她感受着强风的吹拂。她在想为什么父亲就那样了呢？</p> <p>她有点泣不成声，但是她从未有过这种在强风中哭泣的体验。这是一件幸福的事情吧。</p> <p>她想着她母亲强忍着落泪的那时：我是我母亲的孩子，我的哭泣的音色是不是很像母亲？</p> <p>她姿态优雅地向前迈出了一步，又俐落地将另外一只脚向前缩。她想优雅地迈出这样的一步。</p> <p>她从未感觉到那么快的失重的速度，她想着，那就这样吧，她终于可以跟这种那种已经快要将她淹没的失重感告别了。</p> </div> <div class="post-comment" itemprop="comment"> <div id="disqus_thread"></div> <script> (function() { var d = document, s = d.createElement('script'); s.src = 'https://monsooncl.disqus.com/embed.js'; s.setAttribute('data-timestamp', +new Date()); (d.head || d.body).appendChild(s); })(); </script> <noscript>Please enable JavaScript to view the comments.</noscript> </div> </article> </main> </body> </html>
